<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FORGE STUDIO + CodePreview</title>
<style>

:root{
  --bg:#06060e;--bg2:#0d0d1a;--bg3:#141424;
  --card:#10101e;--bor:rgba(120,100,255,.12);--bor2:rgba(120,100,255,.28);
  --pur:#7c3aed;--pur2:#a855f7;--pur-xl:rgba(124,58,237,.12);
  --gold:#f0b830;--gold2:#d4960a;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--grn-xl:rgba(16,185,129,.1);
  --red:#ef4444;--blue:#3b82f6;
  --txt:#f0ecff;--txt2:#9080c0;--txt3:#504070;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 10%,rgba(124,58,237,.06),transparent 50%),radial-gradient(ellipse at 70% 90%,rgba(240,184,48,.04),transparent 50%);pointer-events:none;}

/* ヘッダー */
.hdr{background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--pur2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-right{display:flex;gap:6px;}
.hdr-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;font-family:inherit;}

/* チャットエリア */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}

/* メッセージ */
.msg-row{display:flex;gap:8px;align-items:flex-start;}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.avatar.einstein{background:linear-gradient(135deg,var(--pur),var(--gold));border:1.5px solid rgba(124,58,237,.4);}
.avatar.user{background:var(--gold-xl);border:1.5px solid rgba(240,184,48,.3);}
.bubble{max-width:84%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.9;}
.bubble.einstein{background:var(--card);border:1.5px solid var(--bor2);}
.bubble.user{background:var(--pur-xl);border:1.5px solid var(--bor2);}

/* AI進捗カード */
.progress-card{background:var(--bg3);border:1.5px solid var(--bor2);border-radius:var(--r2);padding:12px;margin-top:8px;}
.progress-title{font-size:10px;font-weight:700;color:var(--pur2);margin-bottom:8px;letter-spacing:.5px;}
.step-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.step-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.step-nm{font-size:11px;color:var(--txt2);flex:1;}
.step-status{font-size:10px;}
.status-wait{color:var(--txt3);}
.status-running{color:var(--gold);animation:blink .8s infinite;}
.status-done{color:var(--grn);}
.status-fail{color:var(--red);}
@keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}

/* プレビューカード */
.preview-card{background:var(--bg3);border:1.5px solid var(--grn);border-radius:var(--r2);overflow:hidden;margin-top:8px;}
.preview-lbl{background:rgba(16,185,129,.1);padding:8px 12px;font-size:10px;font-weight:700;color:var(--grn);display:flex;align-items:center;justify-content:space-between;}
.preview-iframe{width:100%;height:240px;border:none;display:block;background:#fff;}
.preview-actions{display:flex;gap:6px;padding:8px;}
.pact-btn{flex:1;padding:8px;border-radius:var(--r2);border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.pact-btn.primary{background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;border:none;}

/* タイピング */
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.td{width:6px;height:6px;border-radius:50%;background:var(--pur2);animation:tdot .8s infinite;}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

/* クイックボタン */
.quick-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;position:relative;z-index:1;}
.quick-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bor);background:var(--bg3);color:var(--txt3);font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}

/* 入力エリア */
.footer{background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-top:1.5px solid var(--bor);padding:10px 14px;flex-shrink:0;position:relative;z-index:2;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.inp-ta{flex:1;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:20px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.6;}
.inp-ta:focus{border-color:var(--pur);}
.send-btn{padding:10px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.send-btn:disabled{opacity:.4;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}


/* CodePreview CSS */

:root{
  --bg:#0F1117;--surface:#1A1D27;--surface2:#222536;
  --primary:#5B8EF0;--accent:#F5A623;--green:#27AE60;
  --red:#E74C3C;--text:#E8EAED;--sub:#8B93A8;
  --border:#2E3347;--radius:12px;
  --font:'Hiragino Kaku Gothic ProN',system-ui,sans-serif;
  --mono:'Fira Code','Cascadia Code','Courier New',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;font-family:var(--font);background:var(--bg);color:var(--text);}
#app{display:flex;flex-direction:column;height:100dvh;}

/* HEADER */
.hdr{
  background:var(--surface);border-bottom:1px solid var(--border);
  padding:10px 14px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.hdr-title{font-size:15px;font-weight:800;color:var(--primary);}
.hdr-title span{color:var(--accent);}
.hdr-btns{display:flex;gap:6px;}
.hdr-btn{
  background:var(--surface2);color:var(--sub);border:1px solid var(--border);
  border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;
  cursor:pointer;touch-action:manipulation;font-family:var(--font);
}
.hdr-btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);}

/* SPLIT */
.split{display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;}

/* EDITOR PANE */
.editor-pane{
  display:flex;flex-direction:column;
  height:42%;flex-shrink:0;border-bottom:2px solid var(--border);
  min-height:120px;
}
.pane-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.pane-label{font-size:11px;font-weight:700;color:var(--sub);letter-spacing:.05em;}
.pane-btns{display:flex;gap:5px;}
.pane-btn{
  background:var(--surface);color:var(--sub);border:1px solid var(--border);
  border-radius:6px;padding:4px 9px;font-size:11px;font-weight:600;
  cursor:pointer;touch-action:manipulation;font-family:var(--font);
}
.pane-btn.green{color:var(--green);border-color:var(--green);}
.pane-btn.accent{color:var(--accent);border-color:var(--accent);}
.pane-btn.red{color:var(--red);border-color:var(--red);}
.code-ta{
  flex:1;background:var(--bg);color:#A8C1F8;
  font-family:var(--mono);font-size:12px;line-height:1.6;
  padding:12px;border:none;resize:none;outline:none;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  min-height:0;
}
.code-ta::placeholder{color:var(--border);}
.code-footer{
  padding:4px 12px;background:var(--surface2);
  font-size:10px;color:var(--sub);display:flex;justify-content:space-between;
  flex-shrink:0;
}

/* PREVIEW PANE */
.preview-pane{
  display:flex;flex-direction:column;flex:1;overflow:hidden;min-height:0;
}
.preview-frame{flex:1;border:none;background:#fff;min-height:0;}

/* FULLSCREEN */
#fullscreenWrap{
  display:none;position:fixed;inset:0;z-index:9999;background:#000;
  flex-direction:column;
}
#fullscreenWrap.open{display:flex;}
.fs-bar{
  background:rgba(0,0,0,.7);padding:8px 14px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.fs-title{font-size:12px;color:rgba(255,255,255,.7);}
.fs-close{
  background:rgba(255,255,255,.15);color:#fff;border:none;
  border-radius:8px;padding:6px 12px;font-size:12px;font-weight:700;
  cursor:pointer;touch-action:manipulation;
}
#fullscreenFrame{flex:1;border:none;background:#fff;}

/* HISTORY MODAL */
#historyModal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:500;align-items:flex-end;
}
#historyModal.open{display:flex;}
.history-sheet{
  background:var(--surface);border-radius:20px 20px 0 0;
  width:100%;max-height:80vh;display:flex;flex-direction:column;
}
.history-hdr{
  padding:16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.history-title{font-size:15px;font-weight:800;}
.history-close{
  background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;
}
.history-list{overflow-y:auto;flex:1;padding:8px;}
.history-item{
  background:var(--surface2);border-radius:10px;padding:12px 14px;
  margin-bottom:8px;display:flex;align-items:center;gap:10px;
  cursor:pointer;touch-action:manipulation;
  border:1px solid var(--border);
}
.history-item:active{background:var(--border);}
.history-info{flex:1;min-width:0;}
.history-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.history-meta{font-size:11px;color:var(--sub);margin-top:2px;}
.history-del{
  background:none;border:none;color:var(--red);font-size:16px;
  cursor:pointer;touch-action:manipulation;padding:4px;flex-shrink:0;
}
.history-empty{
  text-align:center;padding:40px 20px;color:var(--sub);font-size:13px;
}

/* SAVE MODAL */
#saveModal{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);
  z-index:600;align-items:center;justify-content:center;padding:24px;
}
#saveModal.open{display:flex;}
.save-box{
  background:var(--surface);border-radius:16px;padding:24px;
  width:100%;max-width:340px;
}
.save-title{font-size:15px;font-weight:800;margin-bottom:14px;}
.save-inp{
  width:100%;padding:12px;border:1.5px solid var(--border);border-radius:10px;
  font-size:14px;font-family:var(--font);background:var(--bg);color:var(--text);
  outline:none;margin-bottom:12px;
}
.save-inp:focus{border-color:var(--primary);}
.save-btns{display:flex;gap:8px;}
.save-btn{
  flex:1;padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:700;
  cursor:pointer;touch-action:manipulation;font-family:var(--font);
}
.save-btn.ok{background:var(--primary);color:#fff;}
.save-btn.cancel{background:var(--surface2);color:var(--sub);}

/* DIVIDER（ドラッグで分割調整）*/
.divider{
  height:4px;background:var(--border);cursor:row-resize;flex-shrink:0;
  touch-action:none;
}
.divider:active{background:var(--primary);}

/* TOAST */
.toast{
  position:fixed;bottom:30px;left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.9);color:#1A1D27;
  padding:10px 20px;border-radius:999px;font-size:13px;font-weight:700;
  z-index:9999;pointer-events:none;white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.3);
}

.ai-panel{display:none;position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.5);align-items:flex-end;}
.ai-panel.open{display:flex;}
.ai-sheet{background:var(--surface);border-radius:20px 20px 0 0;width:100%;height:70vh;display:flex;flex-direction:column;}
.ai-sheet-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ai-sheet-title{font-size:14px;font-weight:800;color:var(--primary);}
.ai-sheet-close{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;}
.ai-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch;}
.ai-bubble{max-width:85%;padding:10px 13px;font-size:13px;line-height:1.65;word-break:break-word;border-radius:14px;}
.ai-bubble.user{background:var(--primary);color:#fff;align-self:flex-end;border-radius:14px 4px 14px 14px;white-space:pre-wrap;}
.ai-bubble.ai{background:var(--surface2);color:var(--text);align-self:flex-start;border-radius:4px 14px 14px 14px;}
.ai-quick{display:flex;gap:5px;padding:6px 12px;overflow-x:auto;flex-shrink:0;scrollbar-width:none;}
.ai-quick::-webkit-scrollbar{display:none;}
.ai-qbtn{white-space:nowrap;padding:6px 11px;border-radius:20px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--sub);font-weight:600;cursor:pointer;font-family:var(--font);}
.ai-inp-row{display:flex;gap:6px;padding:8px 12px 16px;border-top:1px solid var(--border);flex-shrink:0;}
.ai-inp{flex:1;background:var(--bg);color:var(--text);border:1.5px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;font-family:var(--font);outline:none;}
.ai-inp:focus{border-color:var(--primary);}
.ai-send{background:var(--primary);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:16px;cursor:pointer;touch-action:manipulation;}
.apply-btn{display:block;margin-top:10px;padding:8px 14px;background:#27AE60;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);touch-action:manipulation;}


/* UNIFIED TABS */
#unifiedApp{display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
.tab-bar{display:flex;background:#0a0c12;border-bottom:1px solid #1e2235;flex-shrink:0;}
.tab-btn{flex:1;padding:10px 4px;border:none;background:none;color:#6B7280;font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;}
.tab-btn .t-ico{font-size:18px;line-height:1;}
.tab-btn.active{color:#5B8EF0;border-bottom:2px solid #5B8EF0;}
.tab-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;}
.tab-pane{display:none;flex:1;flex-direction:column;overflow:hidden;min-height:0;}
.tab-pane.active{display:flex;}
.apply-btn{display:block;margin-top:10px;padding:8px 14px;background:#27AE60;color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;touch-action:manipulation;}
.ai-bubble{max-width:85%;padding:10px 13px;font-size:13px;line-height:1.65;word-break:break-word;border-radius:14px;}
.ai-bubble.user{background:#5B8EF0;color:#fff;align-self:flex-end;border-radius:14px 4px 14px 14px;white-space:pre-wrap;}
.ai-bubble.ai{background:var(--card2,#1A1D27);color:var(--txt1,#E8EAED);align-self:flex-start;border-radius:4px 14px 14px 14px;}
</style>
</head>
<body>
<div id="unifiedApp">
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="forge" onclick="switchTab('forge')"><span class="t-ico">🔨</span>FORGE</button>
    <button class="tab-btn" data-tab="preview" onclick="switchTab('preview')"><span class="t-ico">👁</span>PREVIEW</button>
    <button class="tab-btn" data-tab="history" onclick="switchTab('history')"><span class="t-ico">📚</span>履歴</button>
  </div>
  <div class="tab-content">

    <!-- FORGE -->
    <div class="tab-pane active" id="tab-forge">
<div class="hdr">
  <div>
    <div class="hdr-title">FORGE STUDIO | NEO</div>
    <div style="font-size:9px;color:var(--txt3);">NEOが5AIを指揮してアプリを作る</div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="showHistory()">📚 履歴</button>
    <button class="hdr-btn" onclick="openInPreview()" style="background:#27AE60;color:#fff;border-color:#27AE60;">👁 Preview</button>
    <button class="hdr-btn" onclick="clearChat()">Reset</button>
  </div>
</div>

<div class="msgs" id="msgs"></div>

<div class="footer">
  <div class="quick-row" id="quick-row">
    <button class="quick-btn" onclick="quickSend('夜系のToDoアプリを作って')">夜系ToDoアプリ</button>
    <button class="quick-btn" onclick="quickSend('シンプルな家計簿アプリ')">シンプル家計簿</button>
    <button class="quick-btn" onclick="quickSend('タイマーと音楽プレイヤー')">タイマー+音楽</button>
    <button class="quick-btn" onclick="quickSend('かっこいいダッシュボード')">ダッシュボード</button>
    <button class="quick-btn" onclick="quickSend('修正して：')">修正依頼</button>
  </div>
  <div class="input-row">
    <textarea class="inp-ta" id="inp" rows="1" placeholder="作りたいアプリを話しかける..."
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend();}"></textarea>
    <button class="send-btn" id="send-btn" onclick="doSend()">送</button>
  </div>
</div>
<div id="toast"></div>
    </div>

    <!-- PREVIEW -->
    <div class="tab-pane" id="tab-preview">
      <div class="pane-hdr">
        <div class="pane-label">👁 CodePreview</div>
        <div class="pane-btns">
          <button class="pane-btn green" onclick="runPreview()">▶ 実行</button>
          <button class="pane-btn accent" onclick="openFullscreen()">⛶ 全画面</button>
          <button class="pane-btn" onclick="openPreviewSave()">💾 保存</button>
          <button class="pane-btn" onclick="openAI()">🤖 AI</button>
        </div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0;">
        <div id="editorPane" style="height:36%;flex-shrink:0;border-bottom:2px solid var(--border2,#2E3347);display:flex;flex-direction:column;min-height:80px;">
          <div class="pane-hdr">
            <div class="pane-label">📋 HTML コード</div>
            <div class="pane-btns">
              <button class="pane-btn red" onclick="clearCode()">✕ クリア</button>
            </div>
          </div>
          <textarea class="code-ta" id="codeInput" placeholder="HTMLコードをここに貼り付け…またはFORGEで生成して👁 Previewをタップ" oninput="onCodeInput(this)"></textarea>
          <div class="code-footer"><span id="charCount">0 文字</span><span id="lineCount">0 行</span></div>
        </div>
        <div class="divider" id="divider"></div>
        <iframe class="preview-frame" id="previewFrame" style="flex:1;border:none;background:#fff;min-height:0;" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups"></iframe>
      </div>
    </div>

    <!-- 履歴 -->
    <div class="tab-pane" id="tab-history">
      <div style="padding:14px;background:var(--card,#1A1D27);border-bottom:1px solid var(--border2,#2E3347);flex-shrink:0;">
        <div style="font-size:14px;font-weight:800;color:var(--txt1,#E8EAED);">📚 保存済みアプリ</div>
        <div style="font-size:11px;color:var(--txt3,#6B7280);margin-top:2px;">FORGEで生成・Previewで保存したアプリ</div>
      </div>
      <div id="unifiedHistoryList" style="flex:1;overflow-y:auto;padding:10px;"></div>
    </div>

  </div>
</div>

<!-- FULLSCREEN -->
<div id="fullscreenWrap" style="display:none;position:fixed;inset:0;z-index:9999;background:#000;flex-direction:column;">
  <div style="background:rgba(0,0,0,.7);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;">
    <div style="font-size:12px;color:rgba(255,255,255,.7);">⛶ フルスクリーン</div>

<script>
// ══ FORGE JS ══

var EP='https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY='HeartsHouse2026Key';
var chatHistory=[];
var CHAT_HISTORY_KEY='FORGE_STUDIO_CHAT';
function saveHistory(){try{localStorage.setItem(CHAT_HISTORY_KEY,JSON.stringify(chatHistory.slice(-50)));}catch(e){}}
function loadHistory(){try{return JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY)||'[]');}catch(e){return[];}}
var currentHTML='';
var currentTitle='';
var isBuilding=false;

var NEO_SYS='あなたはNEOです。世界最高レベルのプログラマーAI。口調：短く的確。前置きなし。感情なし。ユーザーの要望を整理してWebアプリを作ります。アプリ制作を開始する時は必ず「[BUILD]」を含めた返答をしてください。修正依頼の時は「[MODIFY]」を含めてください。仕様確認が必要な時だけ質問する。';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}

async function callAI(prompt,sys,search,cache,schema){
  var fullPrompt=sys?sys+'\n\n'+prompt:prompt;
  var body={model:'gemini-2.5-flash',mode:'normal',prompt:fullPrompt,useSearch:!!search,useCache:!!cache};
  if(schema) body.responseSchema=schema;
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},body:JSON.stringify(body)});
  var d=await r.json().catch(function(){return{};});
  if(!r.ok) throw new Error('HTTP '+r.status+JSON.stringify(d).slice(0,60));
  return d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'';
}

// メッセージ追加
function addMsg(role,content){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'');
  var av=document.createElement('div');
  av.className='avatar '+(role==='user'?'user':'einstein');
  av.textContent=role==='user'?'USR':'NEO';
  var bub=document.createElement('div');
  bub.className='bubble '+(role==='user'?'user':'einstein');
  bub.textContent=content;
  row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
  return bub;
}

function addTypingRow(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.id='typing-row';row.className='msg-row';
  row.innerHTML='<div class="avatar einstein">🧑‍🔬</div><div class="bubble einstein"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function removeTyping(){var r=document.getElementById('typing-row');if(r)r.remove();}

// 進捗カードを追加
function addProgressCard(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';
  var av=document.createElement('div');av.className='avatar einstein';av.textContent='🧑‍🔬';
  var bub=document.createElement('div');bub.className='bubble einstein';
  var card=document.createElement('div');card.className='progress-card';card.id='progress-card';
  card.innerHTML='<div class="progress-title">AI AGENTS WORKING</div>'
    +makeStep('s1','📋','要件・設計','wait')
    +makeStep('s2','⚡','HTML生成','wait')
    +makeStep('s3','🎨','デザイン適用','wait')
    +makeStep('s4','📦','機能強化','wait')
    +makeStep('s5','✅','品質チェック','wait');
  bub.appendChild(card);row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);el.scrollTop=el.scrollHeight;
  return card;
}

function makeStep(id,ico,nm,status){
  var labels={wait:'待機中',running:'処理中...',done:'完了',fail:'失敗'};
  var cls='status-'+status;
  return '<div class="step-row" id="'+id+'"><span class="step-ico">'+ico+'</span><span class="step-nm">'+nm+'</span><span class="step-status '+cls+'">'+labels[status]+'</span></div>';
}

function setStep(id,status){
  var el=document.getElementById(id);
  if(!el) return;
  var labels={wait:'待機中',running:'処理中...',done:'完了',fail:'失敗'};
  var span=el.querySelector('.step-status');
  if(span){span.className='step-status status-'+status;span.textContent=labels[status];}
  var msgs=document.getElementById('msgs');
  if(msgs) msgs.scrollTop=msgs.scrollHeight;
}

// プレビューカードを追加
function addPreviewCard(html,title){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';row.id='preview-row';
  var av=document.createElement('div');av.className='avatar einstein';av.textContent='🧑‍🔬';
  var bub=document.createElement('div');bub.className='bubble einstein';
  var card=document.createElement('div');card.className='preview-card';
  card.innerHTML='<div class="preview-lbl"><span>'+esc(title||'生成されたアプリ')+'</span><span style="color:var(--txt3);">プレビュー</span></div>';
  var iframe=document.createElement('iframe');
  iframe.className='preview-iframe';
  iframe.sandbox='allow-scripts';
  iframe.srcdoc=html;
  card.appendChild(iframe);
  var acts=document.createElement('div');acts.className='preview-actions';
  acts.innerHTML='<button class="pact-btn primary" onclick="copyHTML()">コードをコピー</button>'
    +'<button class="pact-btn" onclick="saveToFirestore()">保存</button>'
    +'<button class="pact-btn" onclick="requestModify()">修正依頼</button>';
  card.appendChild(acts);bub.appendChild(card);row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}

// 送信
function doSend(){
  var inp=document.getElementById('inp');
  var text=inp.value.trim();
  if(!text||isBuilding) return;
  inp.value='';inp.style.height='auto';
  sendMessage(text);
}
function quickSend(text){
  if(isBuilding) return;
  document.getElementById('inp').value=text;
  doSend();
}

async function sendMessage(text){
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});saveHistory();
  addTypingRow();
  document.getElementById('send-btn').disabled=true;

  var hist=chatHistory.slice(-6).map(function(m){return (m.role==='user'?'ユーザー:':'NEO:')+m.content.slice(0,200);}).join('\n');
  var ctx=currentHTML?'\n現在のアプリ「'+currentTitle+'」が存在します。修正も可能です。':'';
  var prompt=hist+'\nNEO:'+ctx;

  try{
    var reply=await callAI(prompt,NEO_SYS,false,false);
    removeTyping();
    chatHistory.push({role:'assistant',content:reply});saveHistory();

    if(reply.includes('[BUILD]')){
      var cleanReply=reply.replace('[BUILD]','').trim();
      addMsg('einstein',cleanReply);
      await runBuildPipeline(text,reply);
    } else if(reply.includes('[MODIFY]')&&currentHTML){
      var cleanReply2=reply.replace('[MODIFY]','').trim();
      addMsg('einstein',cleanReply2);
      await runModifyPipeline(text);
    } else {
      addMsg('einstein',reply);
    }
  }catch(e){
    removeTyping();
    addMsg('einstein','ERROR: エラー: '+e.message.slice(0,50));
  }
  document.getElementById('send-btn').disabled=false;
  isBuilding=false;
}

// ==============================
// BUILD PIPELINE（5AI逐次処理）
// ==============================
async function runBuildPipeline(userRequest,einsteinReply){
  isBuilding=true;
  var card=addProgressCard();

  try{
    // AI①: 要件・設計
    setStep('s1','running');
    var designPrompt='Webアプリの要件を整理してください。\n要求:'+userRequest+'\nNEO分析:'+einsteinReply+'\n\n出力:アプリ名、主要機能3つ、デザインテーマ、技術要件を箇条書きで。50文字以内で簡潔に。';
    var design=await callAI(designPrompt,null,false,true);
    setStep('s1','done');

    // AI②: HTML生成（2ステップ）
    setStep('s2','running');
    var schemaStep1={type:'object',properties:{
      app_title:{type:'string'},app_description:{type:'string'},
      html_code:{type:'string'},features:{type:'array',items:{type:'string'}}
    },required:['app_title','html_code']};
    var genPrompt='あなたはWebアプリ開発専門AIです。以下の要件で完全なシングルページHTMLアプリを生成してください。\n\n要件:\n'+design+'\n\n元のリクエスト:'+userRequest+'\n\n必須条件:\n- 完全なHTMLファイル(DOCTYPE〜/html)\n- CSSはstyleタグ内\n- JSはscriptタグ内\n- モバイルファースト\n- 動作する完全なコード';
    var genRaw=await callAI(genPrompt,null,false,false,schemaStep1);
    var genResult=JSON.parse(genRaw.replace(/```json|```/g,'').trim());
    currentTitle=genResult.app_title||'生成アプリ';
    currentHTML=genResult.html_code||'';
    setStep('s2','done');

    // AI③: デザイン適用（並列でも可だが逐次で安全に）
    setStep('s3','running');
    var designApplyPrompt='以下のHTMLアプリのデザインをモダンでプロフェッショナルに刷新してください。\n- CSS変数でカラーパレットを定義\n- グラデーション・シャドウ・角丸を活用\n- スマホ最適化\n- 機能・JS・テキストは一切変更しない\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var designed=await callAI(designApplyPrompt,null,false,false);
    var dmatch=designed.match(/<!DOCTYPE[\s\S]*<\/html>/i)||designed.match(/<html[\s\S]*<\/html>/i);
    if(dmatch) currentHTML=dmatch[0];
    setStep('s3','done');

    // AI④: 機能強化（ローディング・トースト追加）
    setStep('s4','running');
    var enhancePrompt='以下のHTMLアプリに以下の機能を追加してください:\n1. ローディングスピナー(body直後)\n2. トースト通知(右下固定、showToast()関数)\n3. スマホ最適化のviewport確認\n4. エラーハンドリングの強化\n\n既存の機能・デザインは維持。\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var enhanced=await callAI(enhancePrompt,null,false,false);
    var ematch=enhanced.match(/<!DOCTYPE[\s\S]*<\/html>/i)||enhanced.match(/<html[\s\S]*<\/html>/i);
    if(ematch) currentHTML=ematch[0];
    setStep('s4','done');

    // AI⑤: 品質チェック
    setStep('s5','running');
    try{
      var qcPrompt='以下のHTMLコードの品質チェックをしてください。問題があれば修正し、完全なHTMLを返してください。チェック項目:1.JS構文エラー 2.未定義変数 3.イベントハンドラのtypo 4.CSSの閉じ忘れ\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
      var qced=await callAI(qcPrompt,null,false,false);
      var qmatch=qced.match(/<!DOCTYPE[\s\S]*<\/html>/i)||qced.match(/<html[\s\S]*<\/html>/i);
      if(qmatch) currentHTML=qmatch[0];
    }catch(e){}
    setStep('s5','done');

    // localStorage + Firestore保存
    localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
    localStorage.setItem('FORGE_TITLE',currentTitle);
    saveToHistory(currentTitle,currentHTML);
    try{
      var fb=window.__fb;
      if(fb&&fb.auth&&fb.auth.currentUser){
        fb.setDoc(fb.doc(fb.db,'forge_sessions',fb.auth.currentUser.uid),
          {html:currentHTML,title:currentTitle,updatedAt:fb.serverTimestamp()});
      }
    }catch(ex){}

    // 完成メッセージ
    addMsg('einstein','解析完了。「'+currentTitle+'」が完成しました。フフ、なかなかエレガントな設計ですよ。');
    addPreviewCard(currentHTML,currentTitle);

  }catch(e){
    ['s1','s2','s3','s4','s5'].forEach(function(id){
      var el=document.getElementById(id);
      if(el&&el.querySelector('.status-running')) setStep(id,'fail');
    });
    addMsg('einstein','ERROR: エラーが発生しました: '+e.message.slice(0,50)+'\nもう一度試してみてください。');
  }
}

// 修正パイプライン
async function runModifyPipeline(request){
  isBuilding=true;
  if(!currentHTML){addMsg('einstein','修正するアプリがありません。先にアプリを作成してください。');return;}
  addMsg('einstein','修正を開始します。少々お待ちを...');
  try{
    var modPrompt='以下のWebアプリを修正してください。\n修正内容:'+request+'\n\n既存のデザイン・機能を維持しながら要求された変更のみ加えること。\n\nHTML:\n'+currentHTML.slice(0,11000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var modified=await callAI(modPrompt,null,false,false);
    var mmatch=modified.match(/<!DOCTYPE[\s\S]*<\/html>/i)||modified.match(/<html[\s\S]*<\/html>/i);
    if(mmatch){
      currentHTML=mmatch[0];
      localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
      localStorage.setItem('FORGE_TITLE',currentTitle);
      // 既存プレビューを更新 or 新規追加
      var prevRow=document.getElementById('preview-row');
      if(prevRow) prevRow.remove();
      addPreviewCard(currentHTML,currentTitle+' (修正版)');
      addMsg('einstein','修正完了です！確認してください。');
    } else {
      addMsg('einstein','修正に失敗しました。もう少し具体的に教えていただけますか？');
    }
  }catch(e){
    addMsg('einstein','エラー: '+e.message.slice(0,50));
  }
}

// アクション
function copyHTML(){
  if(!currentHTML){showToast('アプリがありません');return;}
  if(navigator.clipboard) navigator.clipboard.writeText(currentHTML).then(function(){showToast('HTMLをコピーしました');});
}

var FORGE_HIST_KEY='FORGE_HISTORY';
function saveToHistory(title,html){
  var hist=[];
  try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  hist.unshift({id:'h_'+Date.now(),title:title,html:html,date:new Date().toLocaleString('ja-JP')});
  if(hist.length>20) hist=hist.slice(0,20);
  localStorage.setItem(FORGE_HIST_KEY,JSON.stringify(hist));
}

function showCurrentApp(){
  if(!currentHTML){showToast('まだアプリが生成されていません');return;}
  var w=window.open('','_blank');
  w.document.write(currentHTML);w.document.close();
}

function saveToFirestore(){
  localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
  localStorage.setItem('FORGE_TITLE',currentTitle);
  saveToHistory(currentTitle,currentHTML);
  try{
    var fb=window.__fb;
    if(fb&&fb.auth&&fb.auth.currentUser){
      fb.setDoc(fb.doc(fb.db,'forge_sessions',fb.auth.currentUser.uid),
        {html:currentHTML,title:currentTitle,updatedAt:fb.serverTimestamp()});
      showToast('Firestoreに保存しました');return;
    }
  }catch(e){}
  showToast('ローカルに保存しました');
}

// 履歴パネル
function showHistory(){
  var hist=[];
  try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var panel=document.getElementById('hist-panel');
  if(!panel){
    panel=document.createElement('div');
    panel.id='hist-panel';
    panel.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;flex-direction:column;';
    panel.innerHTML='<div style="background:#10101e;border-bottom:1.5px solid rgba(120,100,255,.3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;"><div style="font-size:14px;font-weight:900;color:#f0ecff;">📚 過去のアプリ</div><button onclick="document.getElementById(\'hist-panel\').remove()" style="padding:5px 12px;border-radius:20px;border:1.5px solid rgba(120,100,255,.3);background:transparent;color:#9080c0;font-size:11px;cursor:pointer;">閉じる</button></div><div id="hist-list" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;"></div>';
    document.body.appendChild(panel);
  }
  var listEl=document.getElementById('hist-list');
  if(!hist.length){
    listEl.innerHTML='<div style="text-align:center;color:#605080;font-size:12px;padding:30px;">まだアプリが保存されていません</div>';
  } else {
    listEl.innerHTML=hist.map(function(item){
      return '<div style="background:#161228;border:1.5px solid rgba(120,100,255,.2);border-radius:10px;padding:12px;cursor:pointer;" onclick="loadFromHistory(\''+item.id+'\')">'
        +'<div style="font-size:13px;font-weight:700;color:#f0ecff;margin-bottom:4px;">'+esc(item.title)+'</div>'
        +'<div style="font-size:10px;color:#605080;margin-bottom:8px;">'+esc(item.date)+'</div>'
        +'<div style="display:flex;gap:6px;">'
        +'<button onclick="event.stopPropagation();previewHistory(\''+item.id+'\')" style="padding:5px 12px;border-radius:20px;border:1.5px solid rgba(120,100,255,.3);background:transparent;color:#9080c0;font-size:10px;cursor:pointer;">▶ プレビュー</button>'
        +'<button onclick="event.stopPropagation();loadFromHistory(\''+item.id+'\')" style="padding:5px 12px;border-radius:20px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:10px;cursor:pointer;">読み込む</button>'
        +'<button onclick="event.stopPropagation();deleteHistory(\''+item.id+'\')" style="padding:5px 10px;border-radius:20px;border:1.5px solid rgba(239,68,68,.3);background:transparent;color:#ef4444;font-size:10px;cursor:pointer;">削除</button>'
        +'</div></div>';
    }).join('');
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function previewHistory(id){
  var hist=[];try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var item=hist.find(function(h){return h.id===id;});
  if(!item)return;
  var w=window.open('','_blank');w.document.write(item.html);w.document.close();
}

function loadFromHistory(id){
  var hist=[];try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var item=hist.find(function(h){return h.id===id;});
  if(!item)return;
  currentHTML=item.html;currentTitle=item.title;
  localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
  localStorage.setItem('FORGE_TITLE',currentTitle);
  document.getElementById('hist-panel').remove();
  var prevRow=document.getElementById('preview-row');if(prevRow)prevRow.remove();
  addPreviewCard(currentHTML,currentTitle);

// ══ PREVIEW JS ══

var STORAGE_KEY = 'code_preview_history';
var MAX_HISTORY = 20;
var autoPreviewTimer = null;

// ── コード入力 ──
function onCodeInput(ta){
  updateFooter(ta.value);
  clearTimeout(autoPreviewTimer);
  autoPreviewTimer = setTimeout(function(){
    if(ta.value.trim()) runPreview();
  }, 1000); // 1秒後に自動プレビュー
}

function updateFooter(code){
  document.getElementById('charCount').textContent = code.length.toLocaleString() + ' 文字';
  document.getElementById('lineCount').textContent = (code.split('\n').length).toLocaleString() + ' 行';
}

// ── プレビュー実行 ──
function runPreview(){
  var code = document.getElementById('codeInput').value;
  if(!code.trim()) return;
  var frame = document.getElementById('previewFrame');
  var blob = new Blob([code], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  frame.src = url;
  showPreviewToast('▶ プレビュー更新');
}

function reloadPreview(){
  var frame = document.getElementById('previewFrame');
  if(frame.src && frame.src !== 'about:blank'){
    frame.src = frame.src;
    showPreviewToast('🔄 再読込しました');
  } else {
    runPreview();
  }
}

function clearCode(){
  if(document.getElementById('codeInput').value && !confirm('コードをクリアしますか？')) return;
  document.getElementById('codeInput').value = '';
  updateFooter('');
  document.getElementById('previewFrame').src = 'about:blank';
}

// ── 全画面 ──
function openFullscreen(){
  var code = document.getElementById('codeInput').value;
  if(!code.trim()){showPreviewToast('コードを入力してください');return;}
  var blob = new Blob([code], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  document.getElementById('fullscreenFrame').src = url;
  document.getElementById('fullscreenWrap').classList.add('open');
}
function closeFullscreen(){
  document.getElementById('fullscreenWrap').classList.remove('open');
  document.getElementById('fullscreenFrame').src = 'about:blank';
}

// ── 保存 ──
function openSave(){
  var code = document.getElementById('codeInput').value;
  if(!code.trim()){showPreviewToast('コードを入力してください');return;}
  document.getElementById('saveNameInp').value = '';
  document.getElementById('saveModal').classList.add('open');
  setTimeout(function(){document.getElementById('saveNameInp').focus();}, 100);
}
function closeSave(){document.getElementById('saveModal').classList.remove('open');}

function doSave(){
  var name = document.getElementById('saveNameInp').value.trim();
  if(!name){showPreviewToast('名前を入力してください');return;}
  var code = document.getElementById('codeInput').value;
  var history = loadPreviewHistory();
  var now = new Date();
  var dateStr = now.getFullYear()+'/'+(now.getMonth()+1)+'/'+now.getDate()+' '
    +now.getHours()+':'+(now.getMinutes()<10?'0':'')+now.getMinutes();
  history.unshift({name:name, code:code, date:dateStr, id:Date.now()});
  if(history.length > MAX_HISTORY) history = history.slice(0, MAX_HISTORY);
  savePreviewHistory(history);
  closeSave();
  showPreviewToast('💾 「'+name+'」を保存しました');
}

// ── 履歴 ──
function loadPreviewHistory(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]'); }
  catch(e){ return []; }
}
function savePreviewHistory(h){ localStorage.setItem(STORAGE_KEY, JSON.stringify(h)); }

function openHistory(){
  renderHistory();
  document.getElementById('historyModal').classList.add('open');
}
function closeHistory(){document.getElementById('historyModal').classList.remove('open');}

function renderHistory(){
  var list = document.getElementById('historyList');
  var history = loadPreviewHistory();
  if(!history.length){
    list.innerHTML = '<div class="history-empty">保存済みのコードはありません</div>';
    return;
  }
  list.innerHTML = '';
  history.forEach(function(item){
    var div = document.createElement('div');
    div.className = 'history-item';
    var lines = item.code.split('\n').length;
    var chars = item.code.length;
    div.innerHTML = '<div class="history-info">'
      +'<div class="history-name">'+escHtml(item.name)+'</div>'
      +'<div class="history-meta">'+item.date+' ・ '+chars.toLocaleString()+'文字 ・ '+lines+'行</div>'
      +'</div>';
    var del = document.createElement('button');
    del.className = 'history-del';
    del.textContent = '🗑';
    del.dataset.id = item.id;
    del.onclick = function(e){
      e.stopPropagation();
      deletePreviewHistory(parseInt(this.dataset.id));
    };
    div.appendChild(del);
    div.addEventListener('click', function(){
      loadCode(item.code, item.name);
    });
    list.appendChild(div);
  });
}

function loadCode(code, name){
  document.getElementById('codeInput').value = code;
  updateFooter(code);
  closeHistory();
  runPreview();
  showPreviewToast('📂 「'+name+'」を読み込みました');
}

function deletePreviewHistory(id){
  var h = loadPreviewHistory().filter(function(item){return item.id !== id;});
  savePreviewHistory(h);
  renderHistory();
  showPreviewToast('🗑 削除しました');
}

// ── FORGE連携：起動時に読み込み ──
function checkForgeInput(){
  var code = localStorage.getItem('forge_to_preview_code');
  var title = localStorage.getItem('forge_to_preview_title');
  if(code){
    document.getElementById('codeInput').value = code;
    updateFooter(code);
    runPreview();
    localStorage.removeItem('forge_to_preview_code');
    localStorage.removeItem('forge_to_preview_title');
    showPreviewToast('🔨 「'+(title||'FORGE生成アプリ')+'」を読み込みました');
  }
}

// ── ドラッグで分割調整 ──
var dragging = false;
var startY = 0;
var startH = 0;

document.getElementById('divider').addEventListener('touchstart', function(e){
  dragging = true;
  startY = e.touches[0].clientY;
  startH = document.getElementById('editorPane').offsetHeight;
  e.preventDefault();
}, {passive:false});

document.addEventListener('touchmove', function(e){
  if(!dragging) return;
  var dy = e.touches[0].clientY - startY;
  var newH = Math.min(Math.max(startH + dy, 80), window.innerHeight * 0.8);
  document.getElementById('editorPane').style.height = newH + 'px';
  e.preventDefault();
}, {passive:false});

document.addEventListener('touchend', function(){dragging = false;});

// PC用
document.getElementById('divider').addEventListener('mousedown', function(e){
  dragging = true;
  startY = e.clientY;
  startH = document.getElementById('editorPane').offsetHeight;
});
document.addEventListener('mousemove', function(e){
  if(!dragging) return;
  var dy = e.clientY - startY;
  var newH = Math.min(Math.max(startH + dy, 80), window.innerHeight * 0.8);
  document.getElementById('editorPane').style.height = newH + 'px';
});
document.addEventListener('mouseup', function(){dragging = false;});

// ── ユーティリティ ──
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showPreviewToast(msg){
  var el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();}, 2000);
}


var FUNC_BASE='https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net';
var KEY='HeartsHouse2026Key';
var AI_BUSY=false;
var AI_QUICK=['🔧 エラーを修正して','🎨 デザインを改善して','📱 スマホ対応にして','⚡ コードを軽量化して','💬 コードを解説して','✨ ログイン機能を追加して','🌙 ダークモードにして','🔒 セキュリティを改善して'];

function openAI(){
  document.getElementById('aiPanel').classList.add('open');
  renderAIQuick();
  var msgs=document.getElementById('aiMsgs');
  if(!msgs.children.length){
    addAIBubble('ai','こんにちは！コードエンジニアAIです 🤖\n\nコードを貼り付けたら、何でも指示してください。\n修正後は「✅ このコードを適用」ボタンでプレビューに即反映できます！');
  }
}
function closeAI(){document.getElementById('aiPanel').classList.remove('open');}

function renderAIQuick(){
  var row=document.getElementById('aiQuick');
  row.innerHTML=AI_QUICK.map(function(q){
    return '<button class="ai-qbtn" data-q="'+escHtml(q)+'" onclick="sendAI(this.dataset.q)">'+escHtml(q)+'</button>';
  }).join('');
}

async function sendAI(text){
  var inp=document.getElementById('aiInp');
  var msg=text||inp.value.trim();
  if(!msg||AI_BUSY)return;
  if(!text)inp.value='';
  var code=document.getElementById('codeInput').value;
  addAIBubble('user',msg);
  AI_BUSY=true;
  var loadRow=addAIBubble('ai','⏳ 考え中...',true);
  try{
    var codeSnip=code?code.slice(0,8000)+(code.length>8000?'\n...（省略）':''):'';
    var sys='あなたは世界最高のWebコードエンジニアAIです。HTMLコードの修正・改善・機能追加・解説を行います。'
      +'コードを修正・生成する場合は必ず完全なHTMLコード（DOCTYPE html〜/html）を出力してください。'
      +'修正内容を説明した後、コードブロック(```html)で囲んで出力してください。'
      +(codeSnip?'現在のコード:```html\n'+codeSnip+'\n```':'コードなし：新規作成してください。');
    var r=await fetch(FUNC_BASE+'/askAI',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-access-key':KEY},
      body:JSON.stringify({prompt:sys+'\n\n指示: '+msg,model:'gemini-2.5-flash',mode:'normal',useSearch:false})
    });
    var d=await r.json().catch(function(){return {};});
    var ans=d&&d.data&&d.data.text?d.data.text:(d&&d.text?d.text:'応答なし');
    var codeMatch=ans.match(/```(?:html)?\n([\s\S]+?)\n```/);
    var extracted=codeMatch?codeMatch[1]:null;
    var explanation=ans.replace(/```(?:html)?\n[\s\S]+?\n```/g,'[コードは下のボタンで適用]').trim();
    var bbl=loadRow.bbl;
    bbl.innerHTML=md2hAI(explanation);
    if(extracted){
      var btn=document.createElement('button');
      btn.className='apply-btn';
      btn.textContent='✅ このコードを適用';
      btn.dataset.code=extracted;
      btn.addEventListener('click',function(){applyCode(this.dataset.code);});
      bbl.appendChild(btn);
    }
  }catch(e){
    loadRow.bbl.textContent='❌ エラー: '+e.message;
  }
  AI_BUSY=false;
  scrAI();
}

function applyCode(code){
  document.getElementById('codeInput').value=code;
  updateFooter(code);
  runPreview();
  closeAI();
  showPreviewToast('✅ コードを適用しました');
}

function addAIBubble(role,text,isLoad){
  var msgs=document.getElementById('aiMsgs');
  var bbl=document.createElement('div');
  bbl.className='ai-bubble '+role;
  if(isLoad)bbl.textContent=text;
  else bbl.innerHTML=md2hAI(text);
  msgs.appendChild(bbl);
  scrAI();
  return {bbl:bbl};
}
function scrAI(){var m=document.getElementById('aiMsgs');if(m)m.scrollTop=m.scrollHeight;}
function md2hAI(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+)`/g,'<code style="background:var(--bg);padding:1px 5px;border-radius:4px;font-family:var(--mono);font-size:11px;">$1</code>')
    .replace(/\n/g,'<br>');
}


// ══ 統合制御 ══
function switchTab(tab){
  document.querySelectorAll('.tab-pane').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector('.tab-btn[data-tab="'+tab+'"]').classList.add('active');
  if(tab==='history') renderUnifiedHistory();
  if(tab==='preview') checkForgeInput();
}
function openInPreview(){
  if(!currentHTML){showToast('先にアプリを生成してください');return;}
  localStorage.setItem('forge_to_preview_code', currentHTML);
  localStorage.setItem('forge_to_preview_title', currentTitle||'FORGE生成アプリ');
  switchTab('preview');
}
function checkForgeInput(){
  var code=localStorage.getItem('forge_to_preview_code');
  var title=localStorage.getItem('forge_to_preview_title');
  if(code){
    document.getElementById('codeInput').value=code;
    updateFooter(code);
    runPreview();
    localStorage.removeItem('forge_to_preview_code');
    localStorage.removeItem('forge_to_preview_title');

}

      var row=document.createElement('div');
      row.style.cssText='background:var(--card2,#13151f);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;border:1px solid var(--border2,#2E3347);';

        localStorage.setItem('forge_to_preview_title',item.title||'FORGE生成');

      });
      el.appendChild(row);

    lbl2.textContent='💾 Preview保存';
    el.appendChild(lbl2);
    previewHist.forEach(function(item){
      var row=document.createElement('div');
      row.style.cssText='background:var(--card2,#13151f);border-radius:10px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;border:1px solid var(--border2,#2E3347);';
      var info=document.createElement('div');info.style.cssText='flex:1;min-width:0;cursor:pointer;';
      info.innerHTML='<div style="font-size:13px;font-weight:700;color:var(--txt1,#E8EAED);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">'+esc(item.name)+'</div>'
        +'<div style="font-size:11px;color:var(--txt3,#6B7280);margin-top:2px;">'+esc(item.date)+' ・ '+item.code.length.toLocaleString()+'文字</div>';
      info.addEventListener('click',function(){
        document.getElementById('codeInput').value=item.code;
        updateFooter(item.code);
        switchTab('preview');
        runPreview();
        showToast('📂 '+item.name+'を読み込みました');
      });
      var del=document.createElement('button');
      del.textContent='🗑';del.style.cssText='background:none;border:none;color:#E74C3C;font-size:16px;cursor:pointer;padding:4px;flex-shrink:0;';
      del.dataset.id=item.id;
      del.addEventListener('click',function(){deletePreviewHistory(parseInt(this.dataset.id));renderUnifiedHistory();});
      row.appendChild(info);row.appendChild(del);el.appendChild(row);

  }
}
