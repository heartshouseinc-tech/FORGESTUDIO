<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>FORGE STUDIO | NEO</title>
<style>
:root{
  --bg:#06060e;--bg2:#0d0d1a;--bg3:#141424;
  --card:#10101e;--bor:rgba(120,100,255,.12);--bor2:rgba(120,100,255,.28);
  --pur:#7c3aed;--pur2:#a855f7;--pur-xl:rgba(124,58,237,.12);
  --gold:#f0b830;--gold2:#d4960a;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--grn-xl:rgba(16,185,129,.1);
  --red:#ef4444;--blue:#3b82f6;
  --txt:#f0ecff;--txt2:#9080c0;--txt3:#504070;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 10%,rgba(124,58,237,.06),transparent 50%),radial-gradient(ellipse at 70% 90%,rgba(240,184,48,.04),transparent 50%);pointer-events:none;}

/* ヘッダー */
.hdr{background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:2;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--pur2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-right{display:flex;gap:6px;}
.hdr-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;font-family:inherit;}

/* チャットエリア */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}

/* メッセージ */
.msg-row{display:flex;gap:8px;align-items:flex-start;}
.msg-row.user{flex-direction:row-reverse;}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.avatar.einstein{background:linear-gradient(135deg,var(--pur),var(--gold));border:1.5px solid rgba(124,58,237,.4);}
.avatar.user{background:var(--gold-xl);border:1.5px solid rgba(240,184,48,.3);}
.bubble{max-width:84%;padding:10px 14px;border-radius:14px;font-size:12px;line-height:1.9;}
.bubble.einstein{background:var(--card);border:1.5px solid var(--bor2);}
.bubble.user{background:var(--pur-xl);border:1.5px solid var(--bor2);}

/* AI進捗カード */
.progress-card{background:var(--bg3);border:1.5px solid var(--bor2);border-radius:var(--r2);padding:12px;margin-top:8px;}
.progress-title{font-size:10px;font-weight:700;color:var(--pur2);margin-bottom:8px;letter-spacing:.5px;}
.step-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
.step-ico{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.step-nm{font-size:11px;color:var(--txt2);flex:1;}
.step-status{font-size:10px;}
.status-wait{color:var(--txt3);}
.status-running{color:var(--gold);animation:blink .8s infinite;}
.status-done{color:var(--grn);}
.status-fail{color:var(--red);}
@keyframes blink{0%,100%{opacity:.5;}50%{opacity:1;}}

/* プレビューカード */
.preview-card{background:var(--bg3);border:1.5px solid var(--grn);border-radius:var(--r2);overflow:hidden;margin-top:8px;}
.preview-lbl{background:rgba(16,185,129,.1);padding:8px 12px;font-size:10px;font-weight:700;color:var(--grn);display:flex;align-items:center;justify-content:space-between;}
.preview-iframe{width:100%;height:240px;border:none;display:block;background:#fff;}
.preview-actions{display:flex;gap:6px;padding:8px;}
.pact-btn{flex:1;padding:8px;border-radius:var(--r2);border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.pact-btn.primary{background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;border:none;}

/* タイピング */
.typing{display:flex;gap:4px;align-items:center;padding:4px 0;}
.td{width:6px;height:6px;border-radius:50%;background:var(--pur2);animation:tdot .8s infinite;}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,60%,100%{opacity:.3;}30%{opacity:1;}}

/* クイックボタン */
.quick-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;position:relative;z-index:1;}
.quick-btn{padding:5px 12px;border-radius:20px;border:1.5px solid var(--bor);background:var(--bg3);color:var(--txt3);font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}

/* 入力エリア */
.footer{background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-top:1.5px solid var(--bor);padding:10px 14px;flex-shrink:0;position:relative;z-index:2;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.inp-ta{flex:1;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:20px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.6;}
.inp-ta:focus{border-color:var(--pur);}
.send-btn{padding:10px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--pur),var(--pur2));color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.send-btn:disabled{opacity:.4;}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">FORGE STUDIO | NEO</div>
    <div style="font-size:9px;color:var(--txt3);">NEOが5AIを指揮してアプリを作る</div>
  </div>
  <div class="hdr-right">
    <button class="hdr-btn" onclick="showHistory()">📚 履歴</button>
    <button class="hdr-btn" onclick="showCurrentApp()">Preview</button>
    <button class="hdr-btn" onclick="clearChat()">Reset</button>
  </div>
</div>

<div class="msgs" id="msgs"></div>

<div class="footer">
  <div class="quick-row" id="quick-row">
    <button class="quick-btn" onclick="quickSend('夜系のToDoアプリを作って')">夜系ToDoアプリ</button>
    <button class="quick-btn" onclick="quickSend('シンプルな家計簿アプリ')">シンプル家計簿</button>
    <button class="quick-btn" onclick="quickSend('タイマーと音楽プレイヤー')">タイマー+音楽</button>
    <button class="quick-btn" onclick="quickSend('かっこいいダッシュボード')">ダッシュボード</button>
    <button class="quick-btn" onclick="quickSend('修正して：')">修正依頼</button>
  </div>
  <div class="input-row">
    <textarea class="inp-ta" id="inp" rows="1" placeholder="作りたいアプリを話しかける..."
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend();}"></textarea>
    <button class="send-btn" id="send-btn" onclick="doSend()">送</button>
  </div>
</div>
<div id="toast"></div>
<script>
var EP='https://us-central1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY='HeartsHouse2026Key';
var chatHistory=[];
var CHAT_HISTORY_KEY='FORGE_STUDIO_CHAT';
function saveHistory(){try{localStorage.setItem(CHAT_HISTORY_KEY,JSON.stringify(chatHistory.slice(-50)));}catch(e){}}
function loadHistory(){try{return JSON.parse(localStorage.getItem(CHAT_HISTORY_KEY)||'[]');}catch(e){return[];}}
var currentHTML='';
var currentTitle='';
var isBuilding=false;

var NEO_SYS='あなたはNEOです。世界最高レベルのプログラマーAI。口調：短く的確。前置きなし。感情なし。ユーザーの要望を整理してWebアプリを作ります。アプリ制作を開始する時は必ず「[BUILD]」を含めた返答をしてください。修正依頼の時は「[MODIFY]」を含めてください。仕様確認が必要な時だけ質問する。';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}

async function callAI(prompt,sys,search,cache,schema){
  var fullPrompt=sys?sys+'\n\n'+prompt:prompt;
  var body={model:'gemini-2.5-flash',mode:'normal',prompt:fullPrompt,useSearch:!!search,useCache:!!cache};
  if(schema) body.responseSchema=schema;
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},body:JSON.stringify(body)});
  var d=await r.json().catch(function(){return{};});
  if(!r.ok) throw new Error('HTTP '+r.status+JSON.stringify(d).slice(0,60));
  return d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'';
}

// メッセージ追加
function addMsg(role,content){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'');
  var av=document.createElement('div');
  av.className='avatar '+(role==='user'?'user':'einstein');
  av.textContent=role==='user'?'USR':'NEO';
  var bub=document.createElement('div');
  bub.className='bubble '+(role==='user'?'user':'einstein');
  bub.textContent=content;
  row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
  return bub;
}

function addTypingRow(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.id='typing-row';row.className='msg-row';
  row.innerHTML='<div class="avatar einstein">🧑‍🔬</div><div class="bubble einstein"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function removeTyping(){var r=document.getElementById('typing-row');if(r)r.remove();}

// 進捗カードを追加
function addProgressCard(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';
  var av=document.createElement('div');av.className='avatar einstein';av.textContent='🧑‍🔬';
  var bub=document.createElement('div');bub.className='bubble einstein';
  var card=document.createElement('div');card.className='progress-card';card.id='progress-card';
  card.innerHTML='<div class="progress-title">AI AGENTS WORKING</div>'
    +makeStep('s1','📋','要件・設計','wait')
    +makeStep('s2','⚡','HTML生成','wait')
    +makeStep('s3','🎨','デザイン適用','wait')
    +makeStep('s4','📦','機能強化','wait')
    +makeStep('s5','✅','品質チェック','wait');
  bub.appendChild(card);row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);el.scrollTop=el.scrollHeight;
  return card;
}

function makeStep(id,ico,nm,status){
  var labels={wait:'待機中',running:'処理中...',done:'完了',fail:'失敗'};
  var cls='status-'+status;
  return '<div class="step-row" id="'+id+'"><span class="step-ico">'+ico+'</span><span class="step-nm">'+nm+'</span><span class="step-status '+cls+'">'+labels[status]+'</span></div>';
}

function setStep(id,status){
  var el=document.getElementById(id);
  if(!el) return;
  var labels={wait:'待機中',running:'処理中...',done:'完了',fail:'失敗'};
  var span=el.querySelector('.step-status');
  if(span){span.className='step-status status-'+status;span.textContent=labels[status];}
  var msgs=document.getElementById('msgs');
  if(msgs) msgs.scrollTop=msgs.scrollHeight;
}

// プレビューカードを追加
function addPreviewCard(html,title){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';row.id='preview-row';
  var av=document.createElement('div');av.className='avatar einstein';av.textContent='🧑‍🔬';
  var bub=document.createElement('div');bub.className='bubble einstein';
  var card=document.createElement('div');card.className='preview-card';
  card.innerHTML='<div class="preview-lbl"><span>'+esc(title||'生成されたアプリ')+'</span><span style="color:var(--txt3);">プレビュー</span></div>';
  var iframe=document.createElement('iframe');
  iframe.className='preview-iframe';
  iframe.sandbox='allow-scripts';
  iframe.srcdoc=html;
  card.appendChild(iframe);
  var acts=document.createElement('div');acts.className='preview-actions';
  acts.innerHTML='<button class="pact-btn primary" onclick="copyHTML()">コードをコピー</button>'
    +'<button class="pact-btn" onclick="saveToFirestore()">保存</button>'
    +'<button class="pact-btn" onclick="requestModify()">修正依頼</button>';
  card.appendChild(acts);bub.appendChild(card);row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}

// 送信
function doSend(){
  var inp=document.getElementById('inp');
  var text=inp.value.trim();
  if(!text||isBuilding) return;
  inp.value='';inp.style.height='auto';
  sendMessage(text);
}
function quickSend(text){
  if(isBuilding) return;
  document.getElementById('inp').value=text;
  doSend();
}

async function sendMessage(text){
  addMsg('user',text);
  chatHistory.push({role:'user',content:text});saveHistory();
  addTypingRow();
  document.getElementById('send-btn').disabled=true;

  var hist=chatHistory.slice(-6).map(function(m){return (m.role==='user'?'ユーザー:':'NEO:')+m.content.slice(0,200);}).join('\n');
  var ctx=currentHTML?'\n現在のアプリ「'+currentTitle+'」が存在します。修正も可能です。':'';
  var prompt=hist+'\nNEO:'+ctx;

  try{
    var reply=await callAI(prompt,NEO_SYS,false,false);
    removeTyping();
    chatHistory.push({role:'assistant',content:reply});saveHistory();

    if(reply.includes('[BUILD]')){
      var cleanReply=reply.replace('[BUILD]','').trim();
      addMsg('einstein',cleanReply);
      await runBuildPipeline(text,reply);
    } else if(reply.includes('[MODIFY]')&&currentHTML){
      var cleanReply2=reply.replace('[MODIFY]','').trim();
      addMsg('einstein',cleanReply2);
      await runModifyPipeline(text);
    } else {
      addMsg('einstein',reply);
    }
  }catch(e){
    removeTyping();
    addMsg('einstein','ERROR: エラー: '+e.message.slice(0,50));
  }
  document.getElementById('send-btn').disabled=false;
  isBuilding=false;
}

// ==============================
// BUILD PIPELINE（5AI逐次処理）
// ==============================
async function runBuildPipeline(userRequest,einsteinReply){
  isBuilding=true;
  var card=addProgressCard();

  try{
    // AI①: 要件・設計
    setStep('s1','running');
    var designPrompt='Webアプリの要件を整理してください。\n要求:'+userRequest+'\nNEO分析:'+einsteinReply+'\n\n出力:アプリ名、主要機能3つ、デザインテーマ、技術要件を箇条書きで。50文字以内で簡潔に。';
    var design=await callAI(designPrompt,null,false,true);
    setStep('s1','done');

    // AI②: HTML生成（2ステップ）
    setStep('s2','running');
    var schemaStep1={type:'object',properties:{
      app_title:{type:'string'},app_description:{type:'string'},
      html_code:{type:'string'},features:{type:'array',items:{type:'string'}}
    },required:['app_title','html_code']};
    var genPrompt='あなたはWebアプリ開発専門AIです。以下の要件で完全なシングルページHTMLアプリを生成してください。\n\n要件:\n'+design+'\n\n元のリクエスト:'+userRequest+'\n\n必須条件:\n- 完全なHTMLファイル(DOCTYPE〜/html)\n- CSSはstyleタグ内\n- JSはscriptタグ内\n- モバイルファースト\n- 動作する完全なコード';
    var genRaw=await callAI(genPrompt,null,false,false,schemaStep1);
    var genResult=JSON.parse(genRaw.replace(/```json|```/g,'').trim());
    currentTitle=genResult.app_title||'生成アプリ';
    currentHTML=genResult.html_code||'';
    setStep('s2','done');

    // AI③: デザイン適用（並列でも可だが逐次で安全に）
    setStep('s3','running');
    var designApplyPrompt='以下のHTMLアプリのデザインをモダンでプロフェッショナルに刷新してください。\n- CSS変数でカラーパレットを定義\n- グラデーション・シャドウ・角丸を活用\n- スマホ最適化\n- 機能・JS・テキストは一切変更しない\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var designed=await callAI(designApplyPrompt,null,false,false);
    var dmatch=designed.match(/<!DOCTYPE[\s\S]*<\/html>/i)||designed.match(/<html[\s\S]*<\/html>/i);
    if(dmatch) currentHTML=dmatch[0];
    setStep('s3','done');

    // AI④: 機能強化（ローディング・トースト追加）
    setStep('s4','running');
    var enhancePrompt='以下のHTMLアプリに以下の機能を追加してください:\n1. ローディングスピナー(body直後)\n2. トースト通知(右下固定、showToast()関数)\n3. スマホ最適化のviewport確認\n4. エラーハンドリングの強化\n\n既存の機能・デザインは維持。\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var enhanced=await callAI(enhancePrompt,null,false,false);
    var ematch=enhanced.match(/<!DOCTYPE[\s\S]*<\/html>/i)||enhanced.match(/<html[\s\S]*<\/html>/i);
    if(ematch) currentHTML=ematch[0];
    setStep('s4','done');

    // AI⑤: 品質チェック
    setStep('s5','running');
    try{
      var qcPrompt='以下のHTMLコードの品質チェックをしてください。問題があれば修正し、完全なHTMLを返してください。チェック項目:1.JS構文エラー 2.未定義変数 3.イベントハンドラのtypo 4.CSSの閉じ忘れ\n\nHTML:\n'+currentHTML.slice(0,10000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
      var qced=await callAI(qcPrompt,null,false,false);
      var qmatch=qced.match(/<!DOCTYPE[\s\S]*<\/html>/i)||qced.match(/<html[\s\S]*<\/html>/i);
      if(qmatch) currentHTML=qmatch[0];
    }catch(e){}
    setStep('s5','done');

    // localStorage + Firestore保存
    localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
    localStorage.setItem('FORGE_TITLE',currentTitle);
    saveToHistory(currentTitle,currentHTML);
    try{
      var fb=window.__fb;
      if(fb&&fb.auth&&fb.auth.currentUser){
        fb.setDoc(fb.doc(fb.db,'forge_sessions',fb.auth.currentUser.uid),
          {html:currentHTML,title:currentTitle,updatedAt:fb.serverTimestamp()});
      }
    }catch(ex){}

    // 完成メッセージ
    addMsg('einstein','解析完了。「'+currentTitle+'」が完成しました。フフ、なかなかエレガントな設計ですよ。');
    addPreviewCard(currentHTML,currentTitle);

  }catch(e){
    ['s1','s2','s3','s4','s5'].forEach(function(id){
      var el=document.getElementById(id);
      if(el&&el.querySelector('.status-running')) setStep(id,'fail');
    });
    addMsg('einstein','ERROR: エラーが発生しました: '+e.message.slice(0,50)+'\nもう一度試してみてください。');
  }
}

// 修正パイプライン
async function runModifyPipeline(request){
  isBuilding=true;
  if(!currentHTML){addMsg('einstein','修正するアプリがありません。先にアプリを作成してください。');return;}
  addMsg('einstein','修正を開始します。少々お待ちを...');
  try{
    var modPrompt='以下のWebアプリを修正してください。\n修正内容:'+request+'\n\n既存のデザイン・機能を維持しながら要求された変更のみ加えること。\n\nHTML:\n'+currentHTML.slice(0,11000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
    var modified=await callAI(modPrompt,null,false,false);
    var mmatch=modified.match(/<!DOCTYPE[\s\S]*<\/html>/i)||modified.match(/<html[\s\S]*<\/html>/i);
    if(mmatch){
      currentHTML=mmatch[0];
      localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
      localStorage.setItem('FORGE_TITLE',currentTitle);
      // 既存プレビューを更新 or 新規追加
      var prevRow=document.getElementById('preview-row');
      if(prevRow) prevRow.remove();
      addPreviewCard(currentHTML,currentTitle+' (修正版)');
      addMsg('einstein','修正完了です！確認してください。');
    } else {
      addMsg('einstein','修正に失敗しました。もう少し具体的に教えていただけますか？');
    }
  }catch(e){
    addMsg('einstein','エラー: '+e.message.slice(0,50));
  }
}

// アクション
function copyHTML(){
  if(!currentHTML){showToast('アプリがありません');return;}
  if(navigator.clipboard) navigator.clipboard.writeText(currentHTML).then(function(){showToast('HTMLをコピーしました');});
}

var FORGE_HIST_KEY='FORGE_HISTORY';
function saveToHistory(title,html){
  var hist=[];
  try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  hist.unshift({id:'h_'+Date.now(),title:title,html:html,date:new Date().toLocaleString('ja-JP')});
  if(hist.length>20) hist=hist.slice(0,20);
  localStorage.setItem(FORGE_HIST_KEY,JSON.stringify(hist));
}

function showCurrentApp(){
  if(!currentHTML){showToast('まだアプリが生成されていません');return;}
  var w=window.open('','_blank');
  w.document.write(currentHTML);w.document.close();
}

function saveToFirestore(){
  localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
  localStorage.setItem('FORGE_TITLE',currentTitle);
  saveToHistory(currentTitle,currentHTML);
  try{
    var fb=window.__fb;
    if(fb&&fb.auth&&fb.auth.currentUser){
      fb.setDoc(fb.doc(fb.db,'forge_sessions',fb.auth.currentUser.uid),
        {html:currentHTML,title:currentTitle,updatedAt:fb.serverTimestamp()});
      showToast('Firestoreに保存しました');return;
    }
  }catch(e){}
  showToast('ローカルに保存しました');
}

// 履歴パネル
function showHistory(){
  var hist=[];
  try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var panel=document.getElementById('hist-panel');
  if(!panel){
    panel=document.createElement('div');
    panel.id='hist-panel';
    panel.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;flex-direction:column;';
    panel.innerHTML='<div style="background:#10101e;border-bottom:1.5px solid rgba(120,100,255,.3);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;"><div style="font-size:14px;font-weight:900;color:#f0ecff;">📚 過去のアプリ</div><button onclick="document.getElementById(\'hist-panel\').remove()" style="padding:5px 12px;border-radius:20px;border:1.5px solid rgba(120,100,255,.3);background:transparent;color:#9080c0;font-size:11px;cursor:pointer;">閉じる</button></div><div id="hist-list" style="flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:8px;"></div>';
    document.body.appendChild(panel);
  }
  var listEl=document.getElementById('hist-list');
  if(!hist.length){
    listEl.innerHTML='<div style="text-align:center;color:#605080;font-size:12px;padding:30px;">まだアプリが保存されていません</div>';
  } else {
    listEl.innerHTML=hist.map(function(item){
      return '<div style="background:#161228;border:1.5px solid rgba(120,100,255,.2);border-radius:10px;padding:12px;cursor:pointer;" onclick="loadFromHistory(\''+item.id+'\')">'
        +'<div style="font-size:13px;font-weight:700;color:#f0ecff;margin-bottom:4px;">'+esc(item.title)+'</div>'
        +'<div style="font-size:10px;color:#605080;margin-bottom:8px;">'+esc(item.date)+'</div>'
        +'<div style="display:flex;gap:6px;">'
        +'<button onclick="event.stopPropagation();previewHistory(\''+item.id+'\')" style="padding:5px 12px;border-radius:20px;border:1.5px solid rgba(120,100,255,.3);background:transparent;color:#9080c0;font-size:10px;cursor:pointer;">▶ プレビュー</button>'
        +'<button onclick="event.stopPropagation();loadFromHistory(\''+item.id+'\')" style="padding:5px 12px;border-radius:20px;border:none;background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;font-size:10px;cursor:pointer;">読み込む</button>'
        +'<button onclick="event.stopPropagation();deleteHistory(\''+item.id+'\')" style="padding:5px 10px;border-radius:20px;border:1.5px solid rgba(239,68,68,.3);background:transparent;color:#ef4444;font-size:10px;cursor:pointer;">削除</button>'
        +'</div></div>';
    }).join('');
  }
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function previewHistory(id){
  var hist=[];try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var item=hist.find(function(h){return h.id===id;});
  if(!item)return;
  var w=window.open('','_blank');w.document.write(item.html);w.document.close();
}

function loadFromHistory(id){
  var hist=[];try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  var item=hist.find(function(h){return h.id===id;});
  if(!item)return;
  currentHTML=item.html;currentTitle=item.title;
  localStorage.setItem('FORGE_CURRENT_HTML',currentHTML);
  localStorage.setItem('FORGE_TITLE',currentTitle);
  document.getElementById('hist-panel').remove();
  var prevRow=document.getElementById('preview-row');if(prevRow)prevRow.remove();
  addPreviewCard(currentHTML,currentTitle);
  showToast('「'+currentTitle+'」を読み込みました');
}

function deleteHistory(id){
  var hist=[];try{hist=JSON.parse(localStorage.getItem(FORGE_HIST_KEY)||'[]');}catch(e){}
  hist=hist.filter(function(h){return h.id!==id;});
  localStorage.setItem(FORGE_HIST_KEY,JSON.stringify(hist));
  showHistory();
}

function requestModify(){
  document.getElementById('inp').focus();
  document.getElementById('inp').placeholder='修正内容を入力（例：ボタンを大きく・ダークテーマに）';
  showToast('修正内容を入力して送信してください');
}

function clearChat(){
  chatHistory=[];currentHTML='';currentTitle='';
  localStorage.removeItem(CHAT_HISTORY_KEY);
  localStorage.removeItem('FORGE_CURRENT_HTML');
  localStorage.removeItem('FORGE_TITLE');
  document.getElementById('msgs').innerHTML='';
  isBuilding=false;
  var prevRow=document.getElementById('preview-row');
  if(prevRow)prevRow.remove();
  initChat();
}

// 初期化
function initChat(){
  // 履歴を復元
  var saved=loadHistory();
  if(saved.length){
    chatHistory=saved;
    saved.forEach(function(m){
      addMsg(m.role==='assistant'?'einstein':'user',m.content);
    });
    addMsg('einstein','HISTORY RESTORED. '+(currentHTML?'FORGE: ['+currentTitle+'] 読み込み済み。':''));
    return;
  }
  var title=localStorage.getItem('FORGE_TITLE')||'';
  var html=localStorage.getItem('FORGE_CURRENT_HTML')||'';
  if(html&&title){
    currentHTML=html;currentTitle=title;
    var greeting='HISTORY RESTORED.\n\nCONTEXT: ['+title+'] 読み込み済み。\n続きを修正するか新しいアプリを入力してください。';
    addMsg('einstein',greeting);
    addPreviewCard(html,title);
  } else {
    var greeting2='NEO ONLINE. 5AI制作システム起動。\n\n作りたいアプリを入力してください。\n例：「夜系ToDoアプリ」「シンプル家計簿」';
    addMsg('einstein',greeting2);
  }
  chatHistory.push({role:'assistant',content:'初期化完了'});
}

// 前回データを読み込み
(function(){
  var h=localStorage.getItem('FORGE_CURRENT_HTML');
  var t=localStorage.getItem('FORGE_TITLE');
  if(h&&t){currentHTML=h;currentTitle=t;}
})();

setTimeout(initChat,100);
</script>
